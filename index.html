<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skyward ZigZag - Fixed Controls</title>

    <style>
        /* =========================================================
           AESTHETICS & LAYOUT (Monument Valley Inspired)
           ========================================================= */
        :root {
            --bg-sky: #8DE3FE;
            --accent-coral: #FF7F50;
            --ui-card: rgba(255, 255, 255, 0.95);
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            
            /* Safe Areas for iPhone Dynamic Island / Notches */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* CRITICAL MOBILE FIXES: Disable all browser gestural hijacks */
        body, html {
            margin: 0; 
            padding: 0;
            width: 100vw; 
            height: 100vh;
            background-color: var(--bg-sky);
            overflow: hidden;
            
            touch-action: none;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #game-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: block;
            outline: none;
        }

        /* =========================================================
           VISUAL TOUCH FEEDBACK LAYER
           ========================================================= */
        #feedback-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none; /* Touches must bleed through to canvas */
            overflow: hidden;
        }

        /* Initial tap burst animation */
        .tap-burst {
            position: absolute;
            width: 80px; height: 80px;
            border: 3px solid var(--accent-coral);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0.3);
            pointer-events: none;
            animation: burstAnim 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            z-index: 50;
        }

        @keyframes burstAnim {
            to { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* Sustained hold ring */
        .hold-ring {
            position: absolute;
            width: 60px; height: 60px;
            background: rgba(255, 127, 80, 0.2);
            border: 2px solid rgba(255, 127, 80, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 49;
            transition: opacity 0.2s ease;
            box-shadow: 0 0 15px rgba(255, 127, 80, 0.3);
        }

        .hold-ring.fade-out {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.3);
        }

        /* =========================================================
           UI LAYER & MENUS
           ========================================================= */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            
            /* Apply safe areas */
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        .hud {
            display: flex;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .hud.hidden {
            opacity: 0;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.9);
            color: var(--accent-coral);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 1px;
            min-width: 100px;
            text-align: center;
        }

        .center-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ui-screen {
            background: var(--ui-card);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            text-align: center;
            pointer-events: auto; /* Re-enable taps on UI cards */
            width: 85%;
            max-width: 340px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ui-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
            position: absolute; /* Prevent reflow issues when hidden */
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--text-dark);
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-light);
            margin: 0 0 35px 0;
            font-weight: 500;
            font-size: 16px;
            line-height: 1.5;
        }

        .controls-hint {
            display: flex;
            justify-content: space-between;
            background: #F0F4F8;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .hint-box {
            flex: 1;
            font-size: 14px;
            font-weight: 800;
            color: var(--accent-coral);
            text-transform: uppercase;
        }

        .accent-text {
            color: var(--accent-coral);
            font-weight: 900;
            font-size: 48px;
            display: block;
            margin: 15px 0 30px 0;
        }

        button {
            background: var(--accent-coral);
            color: white;
            border: none;
            padding: 18px 32px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 #E5633D, 0 15px 20px rgba(255, 127, 80, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #E5633D, 0 5px 10px rgba(255, 127, 80, 0.3);
        }

        /* Subtle Corner Gameplay Hints */
        .ingame-hints {
            position: absolute;
            bottom: max(30px, var(--safe-bottom));
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            color: rgba(255,255,255,0.8);
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 2px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <div id="game-canvas"></div>

    <div id="feedback-layer"></div>

    <div id="ui-layer">
        
        <div id="hud" class="hud hidden">
            <div id="score-val" class="score-display">0</div>
        </div>

        <div class="center-container">
            <div id="start-screen" class="ui-screen">
                <h1>Skyward ZigZag</h1>
                <p>Monumental geometry. Endless descent.</p>
                <div class="controls-hint">
                    <div class="hint-box">👈 Tap Left</div>
                    <div class="hint-box">Tap Right 👉</div>
                </div>
                <button id="start-btn">Start Journey</button>
            </div>

            <div id="game-over-screen" class="ui-screen hidden">
                <h1>Fallen</h1>
                <p>You drifted off the pathway.</p>
                <span id="final-score" class="accent-text">0</span>
                <button id="restart-btn">Try Again</button>
            </div>
        </div>

        <div id="ingame-hints" class="ingame-hints">
            <span>&larr; L</span>
            <span>R &rarr;</span>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * ============================================================================
         * 1. THE MOBILE CONTROLS FIX (Core architectural fix)
         * ============================================================================
         */
        
        // Dictionary tracking every unique active finger to flawlessly manage Multi-Touch
        const activeTouches = new Map();
        const visualRings = new Map();
        
        // Keyboard fallback state for desktop testing
        const keys = { left: false, right: false };
        
        // Final evaluated steering: -1 (Left), +1 (Right), 0 (Straight)
        let steerDirection = 0; 

        function updateSteering() {
            let steerLeft = keys.left;
            let steerRight = keys.right;
            
            // Iterate over all active fingers safely
            for (const side of activeTouches.values()) {
                if (side === 'left') steerLeft = true;
                if (side === 'right') steerRight = true;
            }
            
            // Perfect dual-touch neutrality cancellation
            if (steerLeft && !steerRight) steerDirection = -1;
            else if (steerRight && !steerLeft) steerDirection = 1;
            else steerDirection = 0;
        }

        // --- Visual Feedback System ---
        function createTapFeedback(id, x, y) {
            const layer = document.getElementById('feedback-layer');
            
            // 1. One-shot pop animation
            const burst = document.createElement('div');
            burst.className = 'tap-burst';
            burst.style.left = x + 'px';
            burst.style.top = y + 'px';
            layer.appendChild(burst);
            setTimeout(() => { if (burst.parentNode) burst.remove(); }, 400);

            // 2. Sustained hold indicator
            const ring = document.createElement('div');
            ring.className = 'hold-ring';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            layer.appendChild(ring);
            
            visualRings.set(id, ring);
        }

        function updateTapFeedback(id, x, y) {
            if (visualRings.has(id)) {
                const ring = visualRings.get(id);
                ring.style.left = x + 'px';
                ring.style.top = y + 'px';
            }
        }

        function removeTapFeedback(id) {
            if (visualRings.has(id)) {
                const ring = visualRings.get(id);
                ring.classList.add('fade-out');
                // Cleanup DOM safely after CSS transition
                setTimeout(() => { if (ring.parentNode) ring.remove(); }, 250);
                visualRings.delete(id);
            }
        }

        // --- Master Touch Event Handlers ---
        const touchOptions = { passive: false }; // Required to allow e.preventDefault()

        function handleTouchStart(e) {
            // Guard: Prevent steering if tapping a UI Overlay card
            if (e.target.closest('.ui-screen')) return; 
            
            // Block Safari double-tap, zoom, and native swipe gestures
            if (e.cancelable) e.preventDefault();
            
            const halfWidth = window.innerWidth / 2;
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                // Dynamic geometric screen bisection
                const side = touch.clientX < halfWidth ? 'left' : 'right';
                
                activeTouches.set(touch.identifier, side);
                createTapFeedback(touch.identifier, touch.clientX, touch.clientY);
            }
            updateSteering();
        }

        function handleTouchMove(e) {
            if (e.target.closest('.ui-screen')) return; 
            if (e.cancelable) e.preventDefault();
            
            const halfWidth = window.innerWidth / 2;
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (activeTouches.has(touch.identifier)) {
                    // Update side dynamically if user slides thumb across the midline
                    const side = touch.clientX < halfWidth ? 'left' : 'right';
                    activeTouches.set(touch.identifier, side);
                    updateTapFeedback(touch.identifier, touch.clientX, touch.clientY);
                }
            }
            updateSteering();
        }

        function handleTouchEnd(e) {
            if (e.target.closest('.ui-screen')) return; 
            if (e.cancelable) e.preventDefault();
            
            // Clean up ONLY the specific fingers that were lifted
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                activeTouches.delete(touch.identifier);
                removeTapFeedback(touch.identifier);
            }
            updateSteering();
        }

        // Attach strict listeners to the canvas document
        document.addEventListener('touchstart', handleTouchStart, touchOptions);
        document.addEventListener('touchmove', handleTouchMove, touchOptions);
        document.addEventListener('touchend', handleTouchEnd, touchOptions);
        document.addEventListener('touchcancel', handleTouchEnd, touchOptions); // OS Interrupts

        // Hard wipe all inputs if iOS triggers a system-wide popup (Low Battery, Call)
        window.addEventListener('blur', () => {
            activeTouches.forEach((_, id) => removeTapFeedback(id));
            activeTouches.clear();
            updateSteering();
        });

        // Desktop Keyboard bindings
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            updateSteering();
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            updateSteering();
        });


        /**
         * ============================================================================
         * 2. GAME ENGINE & AESTHETICS (Monument Valley Inspired Geometry)
         * ============================================================================
         */

        // Game State Engine
        let gameState = 'START'; // START | PLAYING | FALLING
        let score = 0;
        let forwardSpeed = 16;
        let lateralSpeed = 22;
        let fallVelocity = 0;
        
        const clock = new THREE.Clock();

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x8DE3FE);
        scene.fog = new THREE.Fog(0x8DE3FE, 20, 85);

        // Orthographic Isometric Perspective
        const frustumSize = 25;
        let aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(
            -frustumSize * aspect / 2, frustumSize * aspect / 2,
            frustumSize / 2, -frustumSize / 2,
            -50, 200
        );

        const canvasElement = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Save battery, cap pixel ratio
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        canvasElement.appendChild(renderer.domElement);

        // Responsive handling
        window.addEventListener('resize', () => {
            aspect = window.innerWidth / window.innerHeight;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Lighting ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8DE3FE, 0.7);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        // Expansive shadow bounds to cover dynamic paths
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        scene.add(dirLight);

        // --- Entities & Materials ---
        // Player: Coral Geometric Octahedron
        const playerGeo = new THREE.OctahedronGeometry(1.2, 0);
        const playerMat = new THREE.MeshStandardMaterial({
            color: 0xFF7F50, 
            roughness: 0.3, 
            flatShading: true
        });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.castShadow = true;
        scene.add(player);

        // Path blocks
        const pathGroup = new THREE.Group();
        scene.add(pathGroup);
        
        const PATH_WIDTH = 7.5;
        const PATH_LENGTH = 4;
        
        const blockGeo = new THREE.BoxGeometry(PATH_WIDTH, 4, PATH_LENGTH);
        const blockMatLight = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.9, flatShading: true });
        const blockMatDark = new THREE.MeshStandardMaterial({ color: 0xF2F6F9, roughness: 0.9, flatShading: true });

        // Particles System for visual appeal
        const particleGeo = new THREE.BoxGeometry(0.35, 0.35, 0.35);
        const particleMat = new THREE.MeshStandardMaterial({ color: 0xFF7F50, roughness: 0.2 });
        const particles = [];

        function emitParticle(x, y, z) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            mesh.position.set(x + (Math.random()-0.5), y - 0.5, z + (Math.random()-0.5));
            mesh.rotation.set(Math.random(), Math.random(), Math.random());
            scene.add(mesh);
            particles.push({
                mesh, life: 1.0,
                velX: (Math.random()-0.5)*2,
                velY: Math.random()*2,
                velZ: (Math.random()-0.5)*2
            });
        }

        // --- Procedural Generation System ---
        let platforms = [];
        let currentPathZ = 0;
        let currentPathX = 0;
        let targetPathX = 0;
        let blockIndex = 0;

        function createPlatform(x, z) {
            blockIndex++;
            const mat = blockIndex % 2 === 0 ? blockMatLight : blockMatDark;
            const mesh = new THREE.Mesh(blockGeo, mat);
            // Drop Y so the top face rests at 0
            mesh.position.set(x, -2, z);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            pathGroup.add(mesh);
            
            platforms.push({
                mesh,
                bounds: {
                    minX: x - PATH_WIDTH/2 - 0.3, // Soft collision leniency 
                    maxX: x + PATH_WIDTH/2 + 0.3,
                    minZ: z - PATH_LENGTH/2 - 0.5,
                    maxZ: z + PATH_LENGTH/2 + 0.5
                }
            });
        }

        function initPath() {
            // Wipe existing
            platforms.forEach(p => pathGroup.remove(p.mesh));
            platforms = [];
            currentPathZ = 10;
            currentPathX = 0;
            targetPathX = 0;
            
            // Build stable runway
            for(let i=0; i<25; i++) {
                createPlatform(currentPathX, currentPathZ);
                currentPathZ -= PATH_LENGTH;
            }
        }

        function extendPath() {
            // Dynamic track weaving
            if (Math.random() < 0.28) {
                const shift = (Math.random() > 0.5 ? 1 : -1) * (3.5 + Math.random() * 2);
                targetPathX += shift;
                // Hard boundaries to prevent endless lateral drift
                targetPathX = Math.max(-12, Math.min(12, targetPathX));
            }
            
            // Interpolate for connected stairs
            currentPathX += (targetPathX - currentPathX) * 0.35;
            createPlatform(currentPathX, currentPathZ);
            
            currentPathZ -= PATH_LENGTH;
            
            // Memory Management: Destory objects behind camera
            if (platforms.length > 35) {
                const old = platforms.shift();
                pathGroup.remove(old.mesh);
            }
        }


        /**
         * ============================================================================
         * 3. GAMEPLAY LOGIC & ANIMATION LOOP
         * ============================================================================
         */

        const camOffsetX = 20;
        const camOffsetZ = 22;

        function resetGame() {
            initPath();
            player.position.set(0, 1.2, 5);
            player.rotation.set(0, 0, 0);
            
            score = 0;
            forwardSpeed = 16;
            fallVelocity = 0;
            steerDirection = 0;
            
            // Hard wipe touch buffers
            activeTouches.forEach((_, id) => removeTapFeedback(id));
            activeTouches.clear();
            
            gameState = 'PLAYING';
            
            // UI Toggle
            document.getElementById('score-val').innerText = score;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            // Show edge hints momentarily
            const hints = document.getElementById('ingame-hints');
            hints.style.opacity = '1';
            setTimeout(() => hints.style.opacity = '0', 3500);
            
            // Instant snap camera to avoid lerping from old position
            camera.position.set(camOffsetX, 25, player.position.z + camOffsetZ);
            camera.lookAt(0, 0, player.position.z);
        }

        function triggerGameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('final-score').innerText = Math.floor(score);
            
            // Delay menu for dramatic fall viewing
            setTimeout(() => {
                document.getElementById('game-over-screen').classList.remove('hidden');
                document.getElementById('hud').classList.add('hidden');
            }, 1200);
        }

        // Bind HTML Buttons
        document.getElementById('start-btn').addEventListener('click', resetGame);
        document.getElementById('restart-btn').addEventListener('click', resetGame);

        // Pre-build scene for initial Menu aesthetic
        initPath();
        player.position.set(0, 1.2, 5);
        camera.position.set(camOffsetX, 25, player.position.z + camOffsetZ);
        camera.lookAt(0, 0, player.position.z);

        function animate() {
            requestAnimationFrame(animate);
            // Cap delta time to prevent physics explosions on tab switching
            const delta = Math.min(clock.getDelta(), 0.1); 
            
            if (gameState === 'PLAYING') {
                
                // 1. Core Locomotion
                player.position.x += steerDirection * lateralSpeed * delta;
                player.position.z -= forwardSpeed * delta;
                
                // 2. Physical geometric rolling 
                player.rotation.x -= forwardSpeed * 0.15 * delta;
                player.rotation.z += steerDirection * 6 * delta;
                
                // Spring rotational recovery if flying straight
                if (steerDirection === 0) {
                    player.rotation.z += (0 - player.rotation.z) * 12 * delta;
                }
                
                // Slight bounce suspension 
                player.position.y = 1.2 + Math.abs(Math.sin(Date.now() * 0.015)) * 0.2;
                
                // 3. World Generation Trigger
                if (player.position.z - currentPathZ < 75) {
                    extendPath();
                }
                
                // 4. Rayless Collision Detection Engine
                let isSupported = false;
                for (let i=0; i<platforms.length; i++) {
                    const p = platforms[i];
                    if (player.position.z <= p.bounds.maxZ && player.position.z >= p.bounds.minZ) {
                        if (player.position.x >= p.bounds.minX && player.position.x <= p.bounds.maxX) {
                            isSupported = true;
                            break;
                        }
                    }
                }
                
                if (!isSupported) {
                    gameState = 'FALLING';
                } else {
                    // Progression mechanics
                    score += forwardSpeed * delta * 0.2;
                    document.getElementById('score-val').innerText = Math.floor(score);
                    forwardSpeed += 0.12 * delta; // Progressive speed difficulty
                    
                    // FX
                    if (Math.random() < 0.2) {
                        emitParticle(player.position.x, player.position.y, player.position.z);
                    }
                }
                
                // 5. Camera & Light Tracking logic
                const targetCamX = player.position.x * 0.3 + camOffsetX; // dampened follow
                const targetCamZ = player.position.z + camOffsetZ;
                
                camera.position.x += (targetCamX - camera.position.x) * 6 * delta;
                camera.position.z += (targetCamZ - camera.position.z) * 8 * delta;
                
                // Maintain strictly parallel orthographic look vector
                camera.lookAt(camera.position.x - camOffsetX, 0, camera.position.z - camOffsetZ);
                
                // Update local light volume
                dirLight.position.set(camera.position.x - 15, 30, camera.position.z - 5);
                dirLight.target.position.set(camera.position.x - camOffsetX, 0, camera.position.z - camOffsetZ);
                dirLight.target.updateMatrixWorld();

            } else if (gameState === 'FALLING') {
                // Terminate forward drive, apply gravity
                fallVelocity += 35 * delta;
                player.position.y -= fallVelocity * delta;
                
                // Death tumble
                player.rotation.x += 10 * delta;
                player.rotation.y += 8 * delta;
                
                if (player.position.y < -35 && fallVelocity > 20) {
                    triggerGameOver();
                    fallVelocity = 0; // Prevent multi-triggering
                }
            } else if (gameState === 'START') {
                // Menu idle turntable
                player.rotation.y += 0.5 * delta;
                player.position.y = 1.2 + Math.sin(Date.now() * 0.003) * 0.2;
            }
            
            // Process Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta * 1.5;
                p.mesh.position.x += p.velX * delta;
                p.mesh.position.y += p.velY * delta;
                p.mesh.position.z += p.velZ * delta;
                p.mesh.rotation.x += delta * 3;
                p.mesh.rotation.y += delta * 3;
                p.mesh.scale.setScalar(p.life);
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
            
            renderer.render(scene, camera);
        }

        // Fire up the loop
        animate();
    </script>
</body>
</html>
